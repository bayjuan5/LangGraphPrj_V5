name: Launch Rocket - App Startup Test

# Trigger: run on every push to main branch
on:
  push:
    branches: [ "main" ]

jobs:
  launch:
    name: Ignition and Lift-off
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up Python environment
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Step 3: Install Python dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 4: Start the app and verify port 5000 responds
      - name: Launch App and Check Port 5000
        run: |
          # Start Flask server in background; redirect output to log
          NO_BROWSER=1 python app.py > server.log 2>&1 &

          # Wait for startup (adjust if model loading is slow)
          echo "Waiting for ignition..."
          sleep 30

          # Check that port 5000 is accepting connections
          echo "Checking orbit (Port 5000)..."
          curl -v http://localhost:5000 || (cat server.log && exit 1)

      - name: Mission Success
        run: echo "Rocket is in orbit! App started successfully on port 5000."
