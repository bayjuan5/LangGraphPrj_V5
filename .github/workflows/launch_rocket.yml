name: Launch Rocket - App Startup Test

# 触发条件：当你推送代码到 main 分支时
on:
  push:
    branches: [ "main" ]

jobs:
  launch:
    name: Ignition and Lift-off
    runs-on: ubuntu-latest

    steps:
      # 第一步：把 GitHub 仓库里的代码拉取到云端虚拟机
      - name: 🛰️ Checkout Code
        uses: actions/checkout@v4

      # 第二步：安装 Python 环境
      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 第三步：安装依赖（根据你的 requirements.txt）
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 第四步：模拟发射（启动应用并检查端口）
      - name: 🚀 Launch App & Check Port 5000
        run: |
          # 1. 在后台启动 Flask/App，并将输出重定向到日志
          python app.py > server.log 2>&1 &
          
          # 2. 给程序一点启动时间 (根据你的模型加载速度，可以调整为 10 或 20)
          echo "Waiting for ignition..."
          sleep 30
          
          # 3. 检查 5000 端口是否在监听
          # 如果 curl 成功，说明端口开放；如果失败，报错并退出
          echo "Checking orbit (Port 5000)..."
          curl -v http://localhost:5000 || (cat server.log && exit 1)

      - name: 🌟 Mission Success
        run: echo "Rocket is in orbit! App started successfully on port 5000."
